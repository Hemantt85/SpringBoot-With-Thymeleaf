<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>
</head>
<body>
<h2>Conditional Statements (th:if)</h2>
<p th:if="${number1>number2}"
th:text="|${number1} is greater than ${number2}|">
</p>
<p th:if="${number1<number2}"
th:text="|${number1} is less than ${number2}|">
</body>
</html>
